<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/assets/css/terminal.css">
</head>

<body>

<div class="prompt">
  <span class="user">$</span>
  <a href="/" class="cmd-link">./supra</a>
  <span class="cursor">▊</span>
</div>

{% if page.url != "/" %}
<div class="breadcrumb">
  <span class="user">$</span>
  <span class="cmd">cd</span>
  <span class="path">
    {{ page.url
       | remove: '.html'
       | replace_first: '/', '~/'
    }}
  </span>
</div>
{% endif %}


</span>

</div>
{% endif %}

  <div class="boot">
    <div>[+] loading writeups...</div>
    <div>[+] ready</div>
  </div>
</header>

<main class="terminal-content">
  {{ content }}
</main>

<footer class="terminal-footer">
  <span>supra@ctf ~ %</span>
</footer>

</body>
</html>
